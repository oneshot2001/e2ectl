# e2ectl manifest v1
# Edge-to-Edge Pairing Manifest for Retail Store Deployment
#
# Usage:
#   e2ectl plan -f retail-store.yaml          # Validate & preview
#   e2ectl apply -f retail-store.yaml         # Execute pairings
#   e2ectl verify -f retail-store.yaml        # Health check
#   e2ectl teardown -f retail-store.yaml      # Remove pairings

apiVersion: e2ectl/v1
kind: SitePairing
metadata:
  name: retail-store-example
  site: "Example Retail Store — Salt Lake City, UT"
  project: "RETAIL-2026-Q2-001"
  integrator: "Your Company"
  contact: "you@example.com"
  created: "2026-03-19"
  notes: |
    Standard retail deterrence package.
    3x camera+speaker pairs for entrance, pharmacy, parking.
    Audio pairing — requires e2ectl v0.2+ (when audio API support ships).

defaults:
  credentials:
    username: root
    password: ${E2ECTL_DEFAULT_PASS}   # Set via: export E2ECTL_DEFAULT_PASS='...'
  timeout: 15

devices:
  # Cameras
  - name: entrance-cam
    ip: 10.1.1.10
    type: camera
    model: AXIS P3268-LVE

  - name: pharmacy-cam
    ip: 10.1.1.11
    type: camera
    model: AXIS P3265-LVE

  - name: parking-cam
    ip: 10.1.1.12
    type: camera
    model: AXIS Q1786-LE

  # Speakers
  - name: entrance-spk
    ip: 10.1.1.50
    type: speaker
    model: AXIS C1410

  - name: pharmacy-spk
    ip: 10.1.1.51
    type: speaker
    model: AXIS C1310-E

  - name: parking-spk
    ip: 10.1.1.52
    type: speaker
    model: AXIS C1110-E

pairings:
  - name: entrance-deterrence
    type: audio
    subtype: speaker
    primary: entrance-cam
    secondary: entrance-spk
    labels:
      zone: entrance
      purpose: deterrence
      priority: high

  - name: pharmacy-deterrence
    type: audio
    subtype: speaker
    primary: pharmacy-cam
    secondary: pharmacy-spk
    labels:
      zone: pharmacy
      purpose: deterrence
      priority: high

  - name: parking-deterrence
    type: audio
    subtype: speaker
    primary: parking-cam
    secondary: parking-spk
    labels:
      zone: parking-lot
      purpose: deterrence
      priority: medium
